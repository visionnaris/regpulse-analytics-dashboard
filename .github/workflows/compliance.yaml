name: Compliance Alerts

on:
  push:        # Run whenever code is pushed
    branches:
      - main
  # schedule:    # Run daily at 9 AM UTC
  #   - cron: "0 9 * * *"

jobs:
  run-compliance-script:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Step 3: Install dependencies (if any)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sqlite3

      # Step 4: Run compliance script
      - name: Run compliance alerts script
        run: python eu_regulations.py

      # Step 5: Save results as artifact (optional)
      - name: Upload compliance database
        uses: actions/upload-artifact@v3
        with:
          name: EU_Regulations_DB
          path: EU_Regulations.db
