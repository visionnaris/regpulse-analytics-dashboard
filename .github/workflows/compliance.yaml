name: Compliance Alerts Workflow

on:
 workflow_call:
   inputs:
     project:
       type: string
       required: false
# on:
#   push:        # Run whenever code is pushed
#     branches:
#       - main
  # schedule:    # Run daily at 9 AM UTC
  #   - cron: "0 9 * * *"

jobs:
  run-compliance-script:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Step 3: Install dependencies (if any)
      # - name: Install dependencies
      #   run: |
      #     python -m pip install --upgrade pip
      #     pip install sqlite3
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # # Step 4: Run compliance script
      # - name: Run compliance alerts script
      #   run: python eu_regulations.py

     # Step 5: Run Email Notification script
      - name: Run email notification script
        run: python automated_email_notification_to_compliance_officer.py
        
     # Step 6: Save results as artifact (optional)
      - name: Upload compliance database
        uses: actions/upload-artifact@v4
        with:
          name: EU_Regulations_DB
          path: EU_Regulations.db
